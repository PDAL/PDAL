name: Windows

on:
    push:
        paths-ignore:
            - 'doc/**'
        branches-ignore: ["dependabot/**"]
    pull_request:
        paths-ignore:
            - 'doc/**'


concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true


jobs:
  build:
    name: MSVC

    runs-on: 'windows-latest'
    if: "!contains(github.event.head_commit.message, '[ci skip]') && !contains(github.event.head_commit.message, '[skip ci]')"

    strategy:
      fail-fast: true
      matrix:
        type: ['current','fixed']
    defaults:
      run:
        shell: bash -l {0}
    env:
      BUILD_TYPE: ${{ matrix.type }}

    steps:
    - uses: actions/checkout@v6
    - uses: ilammy/msvc-dev-cmd@v1
    - uses: conda-incubator/setup-miniconda@v4
      with:
        miniforge-version: latest
        environment-file: "scripts/ci/${{ matrix.type }}-environment.yml"
        activate-environment: "pdal-build"

    - name: Setup
      run: |
          source ./scripts/ci/win/setup.sh

    - name: CMake
      working-directory: ./build
      run: |
          source ../scripts/ci/win/cmake.sh

    - name: Compile
      working-directory: ./build
      run: |
          source ../scripts/ci/win/compile.sh

    - name: Test
      working-directory: ./build
      run: |
          source ../scripts/ci/win/test.sh

    - name: Examples
      run: |
          source ./scripts/ci/win/examples.sh


